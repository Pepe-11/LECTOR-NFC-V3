<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoporteApp</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0e1a;
            --accent: #00d4ff;
            --accent2: #7c3aed;
            --text: #e2e8f0;
            --muted: #64748b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Syne', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 50% at 30% 30%, rgba(0,212,255,0.07) 0%, transparent 60%),
                radial-gradient(ellipse 50% 50% at 75% 70%, rgba(124,58,237,0.08) 0%, transparent 60%);
            pointer-events: none;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0,212,255,0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,212,255,0.025) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
        }

        .container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2.5rem;
            animation: fadeIn 0.8s ease both;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .brand-icon {
            width: 72px; height: 72px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            font-size: 2rem;
            box-shadow: 0 0 40px rgba(0,212,255,0.25), 0 0 80px rgba(124,58,237,0.15);
            animation: pulse-icon 2.5s ease-in-out infinite;
        }

        @keyframes pulse-icon {
            0%, 100% { box-shadow: 0 0 40px rgba(0,212,255,0.25), 0 0 80px rgba(124,58,237,0.15); }
            50%       { box-shadow: 0 0 60px rgba(0,212,255,0.45), 0 0 100px rgba(124,58,237,0.3); }
        }

        .texts {
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }

        .title {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff 50%, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
        }

        .subtitle {
            font-family: 'Space Mono', monospace;
            font-size: 0.78rem;
            color: var(--muted);
            letter-spacing: 0.05em;
        }

        .progress-wrap {
            width: 260px;
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }

        .progress-bar {
            width: 100%;
            height: 3px;
            background: rgba(100,116,139,0.2);
            border-radius: 100px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            border-radius: 100px;
            box-shadow: 0 0 8px var(--accent);
            transition: width 0.1s linear;
        }

        .progress-label {
            font-family: 'Space Mono', monospace;
            font-size: 0.68rem;
            color: var(--muted);
            text-align: right;
        }

        .dots span {
            display: inline-block;
            width: 5px; height: 5px;
            border-radius: 50%;
            background: var(--accent);
            margin: 0 2px;
            animation: bounce 1.2s ease-in-out infinite;
        }
        .dots span:nth-child(2) { animation-delay: 0.2s; }
        .dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0.5); opacity: 0.3; }
            40%            { transform: scale(1);   opacity: 1; }
        }

        .dots {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 2px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="brand-icon">⬡</div>
    <div class="texts">
        <div class="title">Redirigiendo a SoporteApp</div>
        <div class="subtitle">Espere unos segundos...</div>
    </div>
    <div class="progress-wrap">
        <div class="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
        </div>
        <div class="progress-label" id="progress-label">0%</div>
    </div>
    <div class="dots">
        <span></span><span></span><span></span>
    </div>
</div>

<script>
    const REDIRECT_URL = "https://soporteapp.gcalidad.com";
    const DURATION_MS  = 4000;
    const INTERVAL_MS  = 50;

    let elapsed = 0;
    const fill  = document.getElementById('progress-fill');
    const label = document.getElementById('progress-label');

    const timer = setInterval(() => {
        elapsed += INTERVAL_MS;
        const pct = Math.min((elapsed / DURATION_MS) * 100, 100);
        fill.style.width  = pct + '%';
        label.textContent = Math.floor(pct) + '%';

        if (elapsed >= DURATION_MS) {
            clearInterval(timer);
            window.location.href = REDIRECT_URL;
        }
    }, INTERVAL_MS);
</script>

</body>
</html>
